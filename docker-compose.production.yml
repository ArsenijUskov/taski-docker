# docker-compose.production.yml

volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: arsenijuskov/taski_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static

  frontend:
    image: arsenijuskov/taski_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: arsenijuskov/taski_gateway
    env_file: .env
    volumes:
    - static_volume:/staticfiles
    - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
    - "9000:80"
    - "8443:443"
    depends_on:
    - backend
    - frontend