server {
  listen 80;
  server_name mylearntesting.sytes.net;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name mylearntesting.sytes.net;

  ssl_certificate /etc/letsencrypt/live/mylearntesting.sytes.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mylearntesting.sytes.net/privkey.pem;

  location /api/ {
    proxy_set_header Host $host;
    proxy_pass http://backend:8000;
  }

  location /admin/ {
    proxy_set_header Host $host;
    proxy_pass http://backend:8000;
  }

  location / {
  root /staticfiles;
  index index.html;
  try_files $uri /index.html;
  }
}