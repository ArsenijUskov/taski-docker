server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }
    location /admin/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }
    location / {
        root /staticfiles;
        index index.html;
        try_files $uri /index.html;
    }
}