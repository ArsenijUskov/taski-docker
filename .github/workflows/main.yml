name: Main Taski workflow

# Когда запускать workflow
on:
  push:
    branches:
      - main

jobs:
  #Тесты backend
  tests:
    runs-on: ubuntu-latest

    # Поднимаем сервис PostgreSQL прямо внутри GitHub Actions
    services:
      postgres:
        image: postgres:13.10
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: PASSWORD
          POSTGRES_DB: django_db
        ports:
          - 5432:5432

        # Проверка готовности БД (чтобы тесты не стартовали раньше времени)
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v3

      # Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install flake8==7.3.0 flake8-isort==7.0.0
          pip install -r ./backend/requirements.txt 

      # Запускаем линтер и тесты Django
      - name: Run flake8 and Django tests
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: PASSWORD
          POSTGRES_DB: django_db
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test

  #Backend билд
  build_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub

    # Запускается на новой машине (раннере)
    runs-on: ubuntu-latest

    # ВАЖНО: выполняется только после успешных тестов
    needs: tests

    steps:
      # Снова клонируем репозиторий (раннер новый!)
      - name: Checkout repo
        uses: actions/checkout@v3

      # Устанавливаем Docker Buildx (инструмент для сборки образов)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Логинимся в Docker Hub через secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Сборка и отправка Docker-образа
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          # Путь к Dockerfile
          context: ./backend/

          # Говорим, что нужно не только собрать, но и отправить образ
          push: true

          # Имя образа (ОБЯЗАТЕЛЬНО заменить на свой логин!)
          tags: arsenijuskov/taski_backend:latest